name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del Repositorio
        uses: actions/checkout@v4
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Instalar dependencias
        run: npm ci || npm install
      - name: Compilar proyecto
        run: npm run build
      - name: Validar Secreto de Firebase
        run: |
          node -e "
            try {
              const data = JSON.parse(process.env.FIREBASE_KEY);
              console.log('OK: El secreto de Firebase es un JSON valido.');
              console.log('Project ID:', data.project_id);
              console.log('Client Email:', data.client_email);
              if (!data.private_key) throw new Error('private_key esta vacia');
            } catch (err) {
              console.error('ERROR: El secreto de Firebase NO es un JSON valido o le faltan campos:', err.message);
              process.exit(1);
            }
          "
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ARCHITECTURE_STUDIO_EE3E4 }}
      - name: Desplegar en Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ARCHITECTURE_STUDIO_EE3E4 }}
          channelId: live
          projectId: architecture-studio-ee3e4
