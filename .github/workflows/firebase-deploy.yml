name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del Repositorio
        uses: actions/checkout@v4
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Instalar dependencias
        run: npm ci || npm install
      - name: Compilar proyecto
        run: npm run build
      - name: Validar Secreto de Firebase
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_ARCHITECTURE_STUDIO_EE3E4 }}" ]; then
            echo "ERROR: El secreto FIREBASE_SERVICE_ACCOUNT_ARCHITECTURE_STUDIO_EE3E4 esta VACIO o NO EXISTE."
            echo "Por favor, configuralo en Settings > Secrets and variables > Actions > New repository secret"
            exit 1
          else
            echo "OK: El secreto de Firebase esta configurado en GitHub."
          fi
      - name: Desplegar en Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ARCHITECTURE_STUDIO_EE3E4 }}
          channelId: live
          projectId: architecture-studio-ee3e4
