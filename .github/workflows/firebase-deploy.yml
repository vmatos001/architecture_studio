name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del Repositorio
        uses: actions/checkout@v4
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Instalar dependencias
        run: npm ci || npm install
      - name: Compilar proyecto
        run: npm run build
      - name: Validar Secreto de Firebase
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_ARCHITECTURE_STUDIO_EE3E4 }}" ]; then
            echo "ERROR: El secreto FIREBASE_SERVICE_ACCOUNT_ARCHITECTURE_STUDIO_EE3E4 esta VACIO o NO EXISTE."
            exit 1
          else
            echo "OK: El secreto de Firebase esta configurado en GitHub."
          fi
      - name: Desplegar en Firebase Hosting
        run: |
          cat << 'EOF' > firebase-key.json
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ARCHITECTURE_STUDIO_EE3E4 }}
          EOF
          export GOOGLE_APPLICATION_CREDENTIALS=firebase-key.json
          npx firebase deploy --only hosting --project architecture-studio-ee3e4
          rm firebase-key.json
